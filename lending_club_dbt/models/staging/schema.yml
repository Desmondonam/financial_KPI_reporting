version: 2

models:
  - name: stg_loans
    description: "Cleaned and typed staging layer for Lending Club loan data."
    columns:
      - name: loan_id
        description: "Unique loan identifier."
        data_tests:
          - not_null
          - unique

      - name: loan_amount
        description: "Requested loan amount in USD."
        data_tests:
          - not_null

      - name: interest_rate
        description: "Loan interest rate (%)."
        data_tests:
          - not_null

      - name: grade
        description: "LC-assigned loan grade."
        data_tests:
          - accepted_values:
              arguments:
                values: ["A", "B", "C", "D", "E", "F", "G"]

      - name: is_default
        description: "1 if loan defaulted or was charged-off, else 0."
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1]
