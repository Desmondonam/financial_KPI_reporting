lending_club_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('DB_HOST', 'localhost') }}"
      port:     "{{ env_var('DB_PORT', '5432') | int }}"
      dbname:   "{{ env_var('DB_NAME', 'lending_club') }}"
      user:     "{{ env_var('DB_USER', 'postgres') }}"
      password: "{{ env_var('DB_PASSWORD', 'postgres') }}"
      schema: lending_club
      threads: 4

    ci:
      type: postgres
      host:     "{{ env_var('DB_HOST', 'localhost') }}"
      port:     "{{ env_var('DB_PORT', '5432') | int }}"
      dbname:   "{{ env_var('DB_NAME', 'lending_club') }}"
      user:     "{{ env_var('DB_USER', 'postgres') }}"
      password: "{{ env_var('DB_PASSWORD', 'postgres') }}"
      schema: lending_club
      threads: 2
